services:
  wingman-uploader:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wingman-uploader
    environment:
      ACCOUNT_NAME: "${ACCOUNT_NAME}"
    volumes:
      - "${HOST_ARCDPS_LOG_DIR}:/var/lib/gw2logs/arcdps.cbtlogs"
      - "${HOST_WINGMAN_UPLOADED_DIR}:/var/lib/gw2logs/.wingmanUploaded"
    restart: unless-stopped
